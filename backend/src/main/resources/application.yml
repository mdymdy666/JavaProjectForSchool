server:
  port: 8080

spring:
  application:
    name: campus-trade-backend
  datasource:
    url: jdbc:h2:file:./data/campus_trade;MODE=MySQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE;AUTO_RECONNECT=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      maximum-pool-size: 5
  h2:
    console:
      enabled: true
      path: /h2-console
  sql:
    init:
      mode: always
      schema-locations: classpath:schema-h2.sql
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration
      - org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
  web:
    resources:
      static-locations: file:uploads/,classpath:/static/

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

campus-trade:
  redis-enabled: false
  upload-dir: uploads
  jwt-secret: campus-trade-development-secret-key-2026
